<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Vendora POS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: linear-gradient(135deg, #1f1633 0%, #241a3a 50%, #2b1f4a 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-center;
      padding: 20px;
    }

    .container {
      text-align: center;
      max-width: 500px;
    }

    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }

    h1 {
      font-size: 32px;
      margin-bottom: 16px;
      font-weight: 600;
    }

    p {
      font-size: 16px;
      color: rgba(255, 255, 255, 0.7);
      line-height: 1.6;
      margin-bottom: 32px;
    }

    .features {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 24px;
      text-align: left;
    }

    .feature {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .feature:last-child {
      margin-bottom: 0;
    }

    .feature-icon {
      width: 32px;
      height: 32px;
      background: rgba(139, 92, 246, 0.2);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .feature-text {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.8);
    }

    .button {
      display: inline-block;
      background: #8b5cf6;
      color: white;
      padding: 12px 32px;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 500;
      transition: background 0.2s;
    }

    .button:hover {
      background: #7c3aed;
    }

    .status {
      margin-top: 24px;
      padding: 16px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid rgba(245, 158, 11, 0.3);
      border-radius: 12px;
      font-size: 14px;
      color: rgba(245, 158, 11, 1);
    }

    .pulse {
      animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon pulse">
      📴
    </div>

    <h1>You're Offline</h1>
    <p>No internet connection detected. But don't worry, Vendora POS works offline!</p>

    <div class="features">
      <div class="feature">
        <div class="feature-icon">✅</div>
        <div class="feature-text">Continue creating sales transactions</div>
      </div>
      <div class="feature">
        <div class="feature-icon">💾</div>
        <div class="feature-text">All data saved locally on your device</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🔄</div>
        <div class="feature-text">Auto-sync when connection restores</div>
      </div>
    </div>

    <a href="/pos/pos-screen" class="button">Go to POS</a>

    <div class="status">
      🔍 Checking connection...
    </div>
  </div>

  <script>
    // Check connection status
    function updateStatus() {
      const status = document.querySelector('.status');
      if (navigator.onLine) {
        status.innerHTML = '✅ Connection restored! Redirecting...';
        status.style.background = 'rgba(34, 197, 94, 0.1)';
        status.style.borderColor = 'rgba(34, 197, 94, 0.3)';
        status.style.color = 'rgba(34, 197, 94, 1)';
        setTimeout(() => {
          window.location.href = '/pos/pos-screen';
        }, 1000);
      } else {
        status.innerHTML = '📴 Still offline - will auto-sync when online';
      }
    }

    // Check every 5 seconds
    setInterval(updateStatus, 5000);
    updateStatus();

    // Listen for online event
    window.addEventListener('online', updateStatus);
  </script>
</body>
</html>
